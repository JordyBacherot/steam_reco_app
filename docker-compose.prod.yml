services:
  front:
    image: ghcr.io/JordyBacherot/steam-reco-front:latest
    container_name: front
    restart: always
    ports:
      - "127.0.0.1:5173:80" # 🔒 127.0.0.1 empêche Docker d'ouvrir le port sur internet, seul ton serveur y a accès
    networks:
      - steam_reco_app
    depends_on:
      - api

  api:
    image: ghcr.io/JordyBacherot/steam-reco-api:latest
    container_name: api
    restart: always
    # "command: bun run dev" supprimé -> ton Dockerfile de prod doit démarrer l'app
    ports:
      - "127.0.0.1:3000:3000" 
    environment:
      - NODE_ENV=production
    env_file:
      - .env # Un seul fichier global sur le serveur
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      db:
        condition: service_healthy
    networks:
      - steam_reco_app

  db:
    image: mariadb
    container_name: db
    restart: unless-stopped
    # 🔒 ports: 3306 supprimé -> La BDD est 100% invisible de l'extérieur
    env_file:
      - .env
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - steam_reco_app

  api_recommendation:
    image: ghcr.io/JordyBacherot/steam-reco-recommendation:latest
    container_name: api_recommendation
    restart: always
    # "command: uvicorn --reload" supprimé -> pas de mode "reload" en prod
    ports:
      - "127.0.0.1:8000:8000"
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - steam_reco_app

  adminer:
    image: adminer
    container_name: adminer
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:8080"
    networks:
      - steam_reco_app

volumes:
  db_data:

networks:
  steam_reco_app:
    driver: bridge