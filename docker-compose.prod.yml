services:
  front:
    image: ghcr.io/jordybacherot/steam-reco-front:latest
    container_name: front
    restart: always
    # 🔒 Plus aucun port exposé !
    networks:
      - steam_reco_app
      - proxy-network
    depends_on:
      - api

  api:
    image: ghcr.io/jordybacherot/steam-reco-api:latest
    container_name: api
    restart: always
    # 🔒 Plus aucun port exposé !
    environment:
      - NODE_ENV=production
    env_file:
      - ./api/.env.prod
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      db:
        condition: service_healthy
    networks:
      - steam_reco_app
      - proxy-network

  db:
    image: mariadb
    container_name: db
    restart: unless-stopped
    env_file:
      - ./db/.env.prod
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - steam_reco_app

  api_recommendation:
    image: ghcr.io/jordybacherot/steam-reco-recommendation:latest
    container_name: api_recommendation
    restart: always
    # 🔒 Plus aucun port exposé !
    env_file:
      - ./api_recommendation/.env.prod
    environment:
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\" || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - steam_reco_app
      - proxy-network

volumes:
  db_data:

networks:
  steam_reco_app:
    driver: bridge
  # On déclare le réseau externe qu'on a créé à la main sur le serveur
  proxy-network:
    external: true