name: CI/CD Pipeline

# 1. Quand est-ce que cette usine se lance ?
# -> Seulement sur la branche "main"
# -> ET seulement si un fichier a été modifié dans l'un de ces 3 dossiers
on:
  push:
    branches:
      - main
    paths:
      - "front/**"
      - "api/**"
      - "api_recommendation/**"

jobs:
  build-front:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: 📥 Checkout du code
        uses: actions/checkout@v4

      - name: 🔑 Connexion au GitHub Container Registry (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 📦 Build & Push Front-end (Flutter)
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "API_URL=${{ secrets.API_URL }}" > ./front/.env
          docker build -t ghcr.io/$OWNER/steam-reco-front:latest ./front
          docker push ghcr.io/$OWNER/steam-reco-front:latest

  build-api:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: 📥 Checkout du code
        uses: actions/checkout@v4

      - name: 🔑 Connexion au GitHub Container Registry (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 📦 Build & Push API (Hono)
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          docker build -t ghcr.io/$OWNER/steam-reco-api:latest ./api
          docker push ghcr.io/$OWNER/steam-reco-api:latest

  build-reco:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: 📥 Checkout du code
        uses: actions/checkout@v4

      - name: 🔑 Connexion au GitHub Container Registry (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{
