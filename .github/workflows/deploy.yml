name: CI/CD Pipeline

on:
  workflow_dispatch:

jobs:
  test-apis:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout du code
        uses: actions/checkout@v4
      - name: ⚙️ Configuration de Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: 🛠️ Installation de Bruno CLI
        run: npm install -g @usebruno/cli
      - name: 📝 Création des variables d'environnement (.env) Mocks
        run: |
          echo "NODE_ENV=development" > ./api/.env
          echo "JWT_SECRET=supersecret_pour_les_tests" >> ./api/.env
          echo "DB_HOST=db" >> ./api/.env
          echo "DB_USER=root" >> ./api/.env
          echo "DB_PASSWORD=root" >> ./api/.env
          echo "DB_NAME=steam_reco_app" >> ./api/.env
          echo "API_RECOMMENDATION=http://api_recommendation:8000" >> ./api/.env
          echo "API_KEY_RECOMMENDATION=test_key_123" >> ./api/.env
          echo "GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}" >> ./api/.env

          echo "MYSQL_ROOT_PASSWORD=root" > ./db/.env
          echo "MYSQL_DATABASE=steam_reco_app" >> ./db/.env

          echo "PYTHONUNBUFFERED=1" > ./api_recommendation/.env
          echo "API_KEY=test_key_123" >> ./api_recommendation/.env
      - name: 🐳 Lancement des APIs locales (Docker)
        run: docker compose up -d db api api_recommendation
      - name: ⏳ Attente d'initialisation (Base de données et serveurs)
        run: sleep 20
      - name: 🧪 Exécution ciblée des tests Bruno
        run: |
          cd Bruno

          # 1. Auth (signup + signin)
          bru run Auth/SignUp.bru --env dev --env-var api_key=test_key_123
          bru run Auth/SignIn.bru --env dev --env-var api_key=test_key_123

          # 2. Récupération du token JWT et de l'userId depuis le JWT
          TOKEN=$(curl -s -X POST http://localhost:3000/auth/signin \
            -H "Content-Type: application/json" \
            -d '{"email":"test@example.com","password":"password123"}' | jq -r '.data.token')
          USER_ID=$(curl -s http://localhost:3000/auth/me \
            -H "Authorization: Bearer $TOKEN" | jq -r '.id_user')

          # 3. Tests User (lecture + mise à jour — suppression en dernier)
          bru run User/GetAllUsers.bru --env dev --env-var token=$TOKEN
          bru run User/GetUserById.bru --env dev --env-var token=$TOKEN --env-var userId=$USER_ID
          bru run User/UpdateUser.bru --env dev --env-var token=$TOKEN --env-var userId=$USER_ID

          # 4. Tests Game (création via curl pour récupérer l'ID, update + delete via Bruno)
          GAME_ID=$(curl -s -X POST http://localhost:3000/games \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $TOKEN" \
            -d '{"name":"CI Test Game","description":"A test game for the CI pipeline","studio":"TestStudio","image_url":"https://example.com/game.jpg"}' | jq -r '.id_game')
          bru run Game/UpdateGame.bru --env dev --env-var token=$TOKEN --env-var game_id=$GAME_ID
          bru run Game/DeleteGame.bru --env dev --env-var token=$TOKEN --env-var game_id=$GAME_ID

          # 5. Tests Review (création via curl pour récupérer l'ID, update + delete via Bruno)
          REVIEW_ID=$(curl -s -X POST http://localhost:3000/reviews \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $TOKEN" \
            -d '{"id_game":10,"text":"CI test review"}' | jq -r '.id_review')
          bru run Review/UpdateReview.bru --env dev --env-var token=$TOKEN --env-var reviewId=$REVIEW_ID
          bru run Review/DeleteReview.bru --env dev --env-var token=$TOKEN --env-var reviewId=$REVIEW_ID

          # 6. Tests GameUser
          bru run GameUser/AddGameToLibrary.bru --env dev --env-var token=$TOKEN --env-var userId=$USER_ID
          bru run GameUser/GetUserLibrary.bru --env dev --env-var token=$TOKEN --env-var userId=$USER_ID
          bru run GameUser/RemoveGameFromLibrary.bru --env dev --env-var token=$TOKEN --env-var userId=$USER_ID

          # 7. Tests SteamUser (Create → Update → Delete)
          bru run SteamUser/CreateSteamUser.bru --env dev --env-var token=$TOKEN --env-var userId=$USER_ID
          bru run SteamUser/UpdateSteamUser.bru --env dev --env-var token=$TOKEN --env-var userId=$USER_ID
          bru run SteamUser/DeleteSteamUser.bru --env dev --env-var token=$TOKEN --env-var userId=$USER_ID

          # 8. Tests Recommendation
          bru run "Recommendation (Hono)/Chat Stream (Hono).bru" --env dev --env-var api_key=test_key_123 --env-var token=$TOKEN
          bru run "Recommendation (Hono)/Manual Reco (Hono).bru" --env dev --env-var api_key=test_key_123 --env-var token=$TOKEN
          bru run "Recommendation (Hono)/Nearest Games (Hono).bru" --env dev --env-var api_key=test_key_123 --env-var token=$TOKEN

  build-front:
    needs: [test-apis]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: 📥 Checkout du code
        uses: actions/checkout@v4
      - name: 🔑 Connexion au GitHub Container Registry (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: 📦 Build & Push Front-end (Flutter)
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "API_URL=${{ secrets.API_URL }}" > ./front/.env
          docker build -t ghcr.io/$OWNER/steam-reco-front:latest ./front
          docker push ghcr.io/$OWNER/steam-reco-front:latest

  build-api:
    needs: [test-apis]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: 📥 Checkout du code
        uses: actions/checkout@v4
      - name: 🔑 Connexion au GitHub Container Registry (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: 📦 Build & Push API (Hono)
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          docker build -t ghcr.io/$OWNER/steam-reco-api:latest ./api
          docker push ghcr.io/$OWNER/steam-reco-api:latest

  build-reco:
    needs: [test-apis]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: 📥 Checkout du code
        uses: actions/checkout@v4
      - name: 🔑 Connexion au GitHub Container Registry (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: 📦 Build & Push API Recommendation (FastAPI)
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          docker build -t ghcr.io/$OWNER/steam-reco-recommendation:latest ./api_recommendation
          docker push ghcr.io/$OWNER/steam-reco-recommendation:latest

  deploy:
    needs: [build-front, build-api, build-reco]
    runs-on: ubuntu-latest
    steps:
      - name: 🚀 Déploiement sur le VPS (via Portainer Webhook)
        run: curl -X POST "${{ secrets.PORTAINER_WEBHOOK }}"
